name: Build and Release Android Studio Debian Package

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git build-essential devscripts fakeroot dh-make python3 sudo wget python3-bs4 python3-requests python3-lxml

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Android Studio source
        run: |
          chmod +x ./android-studio-configure.py
          ./android-studio-configure.py trixie --stable --metapackage

      - name: Build Debian package
        run: |
          cd android-studio
          debuild -us -uc -b

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-studio-deb
          path: ./*.deb

  deploy-repo:
    runs-on: ubuntu-latest
    needs: build-deb
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-studio-deb
          path: repo-content

      - name: Setup repository
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils
          chmod +x ./update-repo.sh
          # Create repo directory and move debs
          mkdir -p repo
          mv repo-content/*.deb repo/
          ./update-repo.sh

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          keep_files: true
          force_maintainer: true
